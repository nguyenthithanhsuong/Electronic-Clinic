<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html">Dashboard</a>
        <a href="signin.html">Sign In</a>
        <a href="signup.html">Sign Up</a>
    </nav>

    <h1>Sign Up</h1>
    <div id="message"></div>

    <form id="signupForm">
        <label>Username<br><input type="text" id="username" required></label><br><br>
        <label>Password<br><input type="password" id="password" required></label><br><br>
        <label>Role<br>
            <select id="role">
                <option value="USER">User</option>
                <option value="DOCTOR">Doctor</option>
                <option value="PATIENT">Patient</option>
            </select>
        </label><br><br>
        <button type="submit">Create Account</button>
    </form>

    <script src="common.js"></script>
    <script src="auth.js"></script>
    <script>
        const form = document.getElementById('signupForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            try {
                // For testing we send the raw password as passwordHash
                const resp = await apiPost('/users', { username, passwordHash: password, role, status: 'ACTIVE' });
                showMessage('Account created (id=' + resp.id + ') — redirecting to sign in', 'success');
                setTimeout(() => window.location.href = 'signin.html', 900);
            } catch (err) {
                showMessage('Sign up failed: ' + err.message, 'error');
            }
        });
    </script>
</body>
</html>
